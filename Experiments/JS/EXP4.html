<!DOCTYPE html>
<html>
<head>
<title>Form Validation</title>

<style>
body{
    font-family: Arial;
    background:#f3f3f3;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:20px;
    width:300px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:8px;
    margin-top:5px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:8px;
    margin-top:10px;
    border:none;
    background:blue;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:green;
}

span{
    color:red;
    font-size:12px;
}

#successMsg{
    color:green;
    display:block;
    text-align:center;
    margin-top:10px;
}
</style>

</head>

<body>

<div class="box">
<h2>Form Validation</h2>

<form onsubmit="return submitForm()">

Name:<br>
<input type="text" id="name">
<span id="nameError"></span>
<br><br>

Email:<br>
<input type="text" id="email">
<span id="emailError"></span>
<br><br>

Password:<br>
<input type="password" id="password">
<span id="passwordError"></span>
<br><br>

<button type="submit">Submit</button>
<span id="successMsg"></span>

</form>
</div>

<script src="EXP4.js"></script>

</body>
</html>
