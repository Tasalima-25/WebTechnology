<!--
Event is an action that happens in browser
for example--Clicking a button, moving mouse,pressing key, submitting form, loading page
--Javascript can detect this event and response them.

--Typesof Event
1.Mouse Event
--Click
--dblclick
--mouseover
--mouseout

2.Keyboard Event
--keydown
--keyup

3.Browser Event
--load
--resize
--scroll

Html should contain structure
JS contains logic
Mixing both is bad practice,hard to maintain in weak projects

AddeventListener--
It is JS method used to attach an event handler to an html element so that specific function
when a particular event occurs

Event Propagation--

-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Events Demo</title>

    <style>
        body {
            background-color: #414141;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 15px;
        }

        img {
            width: 200px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        img:hover {
            transform: scale(1.05);
        }

        a {
            color: lightblue;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h2>Amazing Images (Click to Remove)</h2>

    <ul id="images">
        <li>
            <img id="photoshop"
                src="https://upload.wikimedia.org/wikipedia/commons/a/af/Adobe_Photoshop_CC_icon.svg"
                alt="Photoshop Logo">
        </li>

        <li>
            <img id="japan"
                src="https://images.unsplash.com/photo-1501785888041-af3ef285b470"
                alt="Mount Fuji">
        </li>

        <li>
            <img id="Nature"
                src="https://images.unsplash.com/photo-1549880338-65ddcdfd017b"
                alt="Nature Image">
        </li>

        <li>
            <img id="photoman"
                src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
                alt="Photographer">
        </li>

        <li>
            <img id="tiger"
                src="https://images.unsplash.com/photo-1546182990-dffeafbe841d"
                alt="Tiger"
                onclick="alert('This is Tiger')">
        </li>

        <li>
            <a href="https://google.com" id="google">Visit Google</a>
        </li>
    </ul>
  </body>
  <script>
    document.getElementById('Nature').onclick=function(){
        alert("This is Nature Image")
    }
        /*
        Home Activity--Arrow function

        Select Element assign function to click event--
        When clicked function runs--problem occurs when only one event can be assign
        can not handle multiple listener properly

        */
    document.getElementById('japan').addEventListener('click',function(e){
        console.log(e)
        
    })

    /*
    Home Activity---JQuery,Type,Timestamp,Default prevented,target,source element
    current target,client X,client Y,screen X,screen Y,alt key,ctrl key
    */

    //Event Propagation
    document.getElementById('images').addEventListener('click',function(){
        console.log("Clicked inside ul..!")
    })

    document.getElementById('photoman').addEventListener('click',function(){
        console.log("Potoshop Clicked..!")
    })

    document.getElementById('google').addEventListener('click',function(e)
    {
        console.log("Google Clicked..!")
        e.preventDefault()
    })

    /*
    Event goes inner element to parent and parent to documnet
    activity--remove image
    */
   document.getElementById('images').onclick = function(e){

    if(e.target.tagName === 'IMG'){
        e.target.parentElement.remove();
    }

}
    
  </script>
  </html>
